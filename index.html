<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倫理學讀書會互動實驗室</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        :root {
            --bg-color: #020617;
            --glass-bg: rgba(30, 41, 59, 0.75);
        }

        body { 
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color); 
            color: white; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
        }

        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .theory-tag { 
            font-size: 0.7rem; 
            padding: 2px 10px; 
            border-radius: 99px; 
            background: rgba(99, 102, 241, 0.2); 
            border: 1px solid rgba(99, 102, 241, 0.4); 
            color: #c7d2fe;
            white-space: nowrap;
        }

        /* 優化捲軸樣式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        /* 避免 iOS 輸入框縮放 */
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect, useRef } = React;

        function LucideIcon({ name, color = "currentColor", className = "w-6 h-6" }) {
            const spanRef = useRef(null);
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.lucide && spanRef.current) {
                        clearInterval(timer);
                        const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        spanRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                        window.lucide.createIcons({
                            root: spanRef.current,
                            attrs: { class: className, stroke: color, 'stroke-width': 2 }
                        });
                    }
                }, 100);
                return () => clearInterval(timer);
            }, [name, color, className]);
            return e('span', { ref: spanRef, className: 'inline-flex items-center justify-center shrink-0' });
        }

        function App() {
            const [activeFlow, setActiveFlow] = useState(null);
            const [step, setStep] = useState(0);
            const [selectedChoice, setSelectedChoice] = useState(null);
            const [reflection, setReflection] = useState('');
            const [isSubmitted, setIsSubmitted] = useState(false);

            // 當切換頁面時，自動捲動到頂部 (對行動版很重要)
            useEffect(() => { window.scrollTo(0, 0); }, [activeFlow]);

            const experiments = {
                trolley: { 
                    title: "電車問題", 
                    tag: "規範倫理學：目的論",
                    icon: "Train", 
                    color: "#f87171", 
                    img: "https://i.ibb.co/Q7fssnLR/trolley.png"
                },
                fatman: { 
                    title: "胖子與天橋", 
                    tag: "規範倫理學：義務論",
                    icon: "Hand", 
                    color: "#fb923c", 
                    img: "https://i.ibb.co/YFyxd89X/fatman.png"
                },
                transplant: { 
                    title: "規則 vs. 行為效益主義",
                    icon: "Activity", 
                    color: "#f472b6", 
                    tag: "醫療倫理判斷",
                    img: "https://i.ibb.co/nNCMznHt/transplant.png"
                },
                machine: { 
                    title: "快樂機器", 
                    tag: "價值論：享樂主義",
                    icon: "Brain", 
                    color: "#a78bfa", 
                    img: "https://i.ibb.co/7J8MXPnV/machine.png"
                },
                lifeboat: { 
                    title: "救生艇兩難", 
                    tag: "社會正義：分配正義",
                    icon: "LifeBuoy", 
                    color: "#22d3ee", 
                    img: "https://i.ibb.co/bgbkn0Zx/lifeboat.png"
                },
                ring: { 
                    title: "蓋吉氏戒指", 
                    tag: "倫理利己主義",
                    icon: "Gem", 
                    color: "#fbbf24", 
                    img: "https://i.ibb.co/8n7fN5zY/ring.png"
                }
            };

            const studyGuides = {
                trolley: {
                    dilemma: "失控電車衝向 5 人，轉轍器可切換至 1 人軌道。你拉嗎？",
                    options: [
                        {
                            text: "拉下轉轍器 (1死5生)",
                            feedback: "符合林火旺教授所提的「行為效益主義」：針對具體行為計算最大效益。你認為結果的「好/壞」決定了行為的「對/錯」。",
                            perspective: { name: "效益原則 (Utility Principle)", desc: "主張整體結果能產生最大量的善時就是對的行為。5 大於 1，故行動被證成為正當。" }
                        },
                        {
                            text: "什麼都不做 (5死1生)",
                            feedback: "體現了「義務論」立場：有些行為（如殺害無辜者）本質即錯誤，不論結果。你拒絕將人當作純粹計數單位。",
                            perspective: { name: "義務論 (Deontology)", desc: "康德提出，主張對錯不由結果決定，而是由行為性質決定。義務是尊重法則的必然表現。" }
                        }
                    ],
                    questions: "「主動殺害一人」與「任由五人死亡」，在道德判斷上有本質的區別嗎？"
                },
                fatman: {
                    dilemma: "在天橋推下一名胖子擋住電車可救下 5 人。你會動手嗎？",
                    options: [
                        {
                            text: "推下胖子 (殺一救五)",
                            feedback: "採取極端的結果論立場。引發了「消極責任」質疑：你是否承擔了本不該由你承擔的道德負擔？",
                            perspective: { name: "心理利己主義挑戰", desc: "你是為了減少自己的痛苦，還是真的為了效益？此舉犧牲了人格完整性以換取數字回報。" }
                        },
                        {
                            text: "絕對不推 (捍衛生命尊嚴)",
                            feedback: "契合「雙重效應原則」：拉轉轍器是為救人產生的副作用，但推人是直接將人命當作達成目的的「工具」。",
                            perspective: { name: "定言令式：目的原則", desc: "康德強調：「人是目的，而非手段」。推下胖子直接將其工具化，在義務論下是禁令。" }
                        }
                    ],
                    questions: "道德是建立在冷靜的數學邏輯上，還是建立在人類必須遵守的根本義務上？"
                },
                transplant: {
                    dilemma: "醫生強行拆分 1 名健康者的器官救活 5 人。這符合道德嗎？",
                    options: [
                        {
                            text: "執行手術 (單次效益極大化)",
                            feedback: "行為效益主義的極端運用。你認為在數字面前個人犧牲可接受，但忽略了社會信任系統崩潰的隱形成本。",
                            perspective: { name: "行為效益主義困境", desc: "過度關注個案。若民眾知道去醫院可能被拆分，社會整體的安全感價值將歸零。" }
                        },
                        {
                            text: "拒絕手術 (維護制度正義)",
                            feedback: "符合「規則效益主義」。應遵循能產生最大整體效益的「規則」（如保護病人權益），而非僅看單次行為。",
                            perspective: { name: "規則效益主義", desc: "效益原則用來檢驗「規則」而非行為。守護個人自主權是長遠最大幸福的保證。" }
                        }
                    ],
                    questions: "如果為了「大多數人的最大幸福」可以隨時犧牲你，這樣的社會是你所渴望的嗎？"
                },
                machine: {
                    dilemma: "插上電極即能獲得永遠的極致快樂，且不知是虛擬。你會進入嗎？",
                    options: [
                        {
                            text: "進入機器 (追求內在價值)",
                            feedback: "認同「享樂主義」：快樂是唯一具有內在價值的事。只要感官與心靈獲得滿足，虛擬與否並不重要。",
                            perspective: { name: "享樂主義：滿足論", desc: "快樂不只是感官。若機器能模擬終極心靈滿足，這就是人生的理性終點。" }
                        },
                        {
                            text: "留在現實 (追求真實價值)",
                            feedback: "認為人生有比快樂更重要的價值。諾齊克指出：我們在乎「真實地做某些事」以及與現實的連結。",
                            perspective: { name: "價值多元論 (Pluralism)", desc: "除了快樂，知識、自由、真實性也具內在價值。真實的痛苦比虛擬快樂更能定義自我。" }
                        }
                    ],
                    questions: "「寧願是一個不滿足的人，也不願意是一隻滿足的豬。」這句話在你心中有共鳴嗎？"
                },
                lifeboat: {
                    dilemma: "最後一個救生艇位，要給 80 歲天才、5 歲孤兒，還是孕婦？",
                    options: [
                        {
                            text: "基於價值排序挑選",
                            feedback: "試圖對生命進行價值測量。這在分配正義中極其困難，因為任何標準都可能隱含偏見與歧視。",
                            perspective: { name: "分配正義的難題", desc: "效益主義只在意「總和」，不關心分配。這暴露了目的論在公平議題上的脆弱性。" }
                        },
                        {
                            text: "抽籤決定 (絕對平等)",
                            feedback: "符合「生命平權觀點」。在極端情況下，讓機率決定是唯一維持生命絕對平等尊嚴的方式。",
                            perspective: { name: "羅爾斯：無知之幕", desc: "假設你不知道自己是誰，你制定的規則才會最公平。抽籤保護了未知身份下的平權機率。" }
                        }
                    ],
                    questions: "生命的重量可以被比較嗎？如果我們承認生命價值有高低，社會將走向何方？"
                },
                ring: {
                    dilemma: "若擁有隱身戒指且不受懲罰，你還會堅持做道德的人嗎？",
                    options: [
                        {
                            text: "會為了私利行動",
                            feedback: "觸及格勞孔論證：道德只是弱者為免受害而制定的契約。這屬於「心理利己主義」範疇。",
                            perspective: { name: "社會契約與利己主義", desc: "認為正義出於對懲罰的恐懼。若追求私利且無風險，追求利益即是理性表現。" }
                        },
                        {
                            text: "依然堅持道德",
                            feedback: "實踐了「德行論」。道德是為了「靈魂的健康」。即便無人看見，損害德行即是損害自己獲得真實幸福的能力。",
                            perspective: { name: "德行倫理學 (Virtue Ethics)", desc: "核心在於「我要成為什麼樣的人」。建立穩定的人格特質（德行），即是最高理性目標。" }
                        }
                    ],
                    questions: "道德是外在的枷鎖，還是人內在靈魂健全的必然表現？"
                }
            };

            const goHome = () => { setActiveFlow(null); setStep(0); setSelectedChoice(null); };

            if (activeFlow) {
                const exp = experiments[activeFlow];
                const guide = studyGuides[activeFlow];
                return e('div', { className: 'max-w-3xl mx-auto py-8 px-4 md:py-12 md:px-6 fade-in' },
                    e('button', { onClick: goHome, className: 'mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors active:scale-95' },
                        e(LucideIcon, { name: 'ArrowLeft', className: 'w-4 h-4' }), " 返回大廳"
                    ),
                    e('div', { className: 'glass p-6 md:p-12 rounded-2xl md:rounded-3xl border-l-4 shadow-2xl', style: { borderColor: exp.color } },
                        e('div', { className: 'flex flex-col md:flex-row md:justify-between md:items-start gap-4 mb-8' },
                            e('div', null,
                                e('span', { className: 'theory-tag mb-3 inline-block' }, exp.tag || "倫理學試煉"),
                                e('h2', { className: 'text-2xl md:text-4xl font-bold flex items-center gap-3' }, 
                                    exp.title,
                                    e(LucideIcon, { name: exp.icon, color: exp.color, className: 'w-7 h-7 md:w-10 md:h-10' })
                                )
                            )
                        ),
                        step === 0 ? e('div', null,
                            e('div', { className: 'p-6 md:p-8 bg-slate-900/60 rounded-xl md:rounded-2xl border border-slate-700 mb-8' },
                                e('h4', { className: 'text-indigo-400 font-bold mb-3 flex items-center gap-2 text-sm uppercase tracking-widest' }, 
                                    e(LucideIcon, {name:'BookOpen', className:'w-4 h-4'}), "導讀情境"
                                ),
                                e('p', { className: 'text-lg md:text-xl text-slate-200 leading-relaxed' }, guide.dilemma)
                            ),
                            e('div', { className: 'grid grid-cols-1 gap-4' },
                                guide.options.map((opt, idx) => 
                                    e('button', { 
                                        key: idx,
                                        onClick: () => { setSelectedChoice(idx); setStep(1); }, 
                                        className: 'p-5 bg-slate-800 hover:bg-indigo-600 active:bg-indigo-700 rounded-xl font-bold text-base md:text-lg text-white transition-all border border-slate-700 active:scale-[0.98]' 
                                    }, opt.text)
                                )
                            )
                        ) : e('div', { className: 'fade-in space-y-6 md:space-y-8' },
                            e('div', { className: 'p-6 md:p-8 bg-indigo-900/20 rounded-xl md:rounded-2xl border border-indigo-500/30' },
                                e('h4', { className: 'text-indigo-300 font-bold mb-4 flex items-center gap-2 text-sm uppercase' }, 
                                    e(LucideIcon, {name:'Fingerprint', className:'w-4 h-4'}), "哲學剖析"
                                ),
                                e('p', { className: 'text-lg text-white leading-relaxed font-medium mb-6' }, guide.options[selectedChoice].feedback),
                                e('div', { className: 'p-5 bg-slate-900/80 rounded-xl border-l-4 border-indigo-500' },
                                    e('h5', { className: 'text-indigo-300 font-bold text-base mb-2' }, guide.options[selectedChoice].perspective.name),
                                    e('p', { className: 'text-slate-300 text-sm leading-relaxed' }, guide.options[selectedChoice].perspective.desc)
                                )
                            ),
                            e('div', { className: 'p-6 md:p-8 bg-slate-900/40 rounded-xl border-l-4 border-blue-500' },
                                e('h4', { className: 'text-blue-400 font-bold mb-3 text-sm uppercase' }, "深度思辨提問"),
                                e('p', { className: 'text-lg text-white leading-relaxed font-bold' }, guide.questions)
                            ),
                            e('button', { onClick: goHome, className: 'w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold text-white transition-colors active:scale-95' }, "完成本次思辨")
                        )
                    )
                );
            }

            return e('div', { className: 'max-w-5xl mx-auto py-10 px-4 md:py-16 md:px-6 fade-in' },
                e('header', { className: 'text-center mb-12 md:mb-20' },
                    e('h1', { className: 'text-4xl md:text-6xl font-black mb-6 bg-gradient-to-r from-blue-400 via-purple-400 to-pink-500 bg-clip-text text-transparent' }, "倫理學讀書會實驗室"),
                    e('p', { className: 'text-slate-400 text-lg md:text-xl font-medium max-w-2xl mx-auto leading-relaxed' }, "透過林火旺教授的思辨架構，我們在此對習以為常的道德規則提出理性的質疑。")
                ),
                
                // 導讀區
                e('section', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6 mb-16' },
                    [
                        { title: '什麼是倫理學？', content: '對背景預設進行批判評估，透過理性能力為道德處境找解答。', icon: 'Search' },
                        { title: '價值的選擇', content: '道德衝突源頭即價值衝突。必須先釐清價值，才能進行判斷。', icon: 'Scale' },
                        { title: '如何生活？', content: '研究理論不只是知識，而是為了在抉擇時能比較輕鬆且篤定。', icon: 'Sun' }
                    ].map((item, idx) => e('div', { key: idx, className: 'glass p-6 rounded-2xl border-b-2 border-indigo-500/30' },
                        e('div', { className: 'flex items-center gap-3 mb-3 text-indigo-400 font-bold' }, 
                            e(LucideIcon, { name: item.icon, className: 'w-5 h-5' }), item.title
                        ),
                        e('p', { className: 'text-slate-400 text-sm leading-relaxed' }, item.content)
                    ))
                ),

                // 主網格
                e('section', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 mb-20' },
                    Object.entries(experiments).map(([key, exp]) => 
                        e('div', { key, onClick: () => setActiveFlow(key), className: 'glass rounded-2xl overflow-hidden cursor-pointer hover:scale-[1.02] active:scale-[0.98] transition-all group border border-slate-800' },
                            e('div', { className: 'h-40 md:h-48 relative overflow-hidden' },
                                e('img', { src: exp.img, className: 'h-full w-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700 group-hover:scale-105', referrerPolicy: 'no-referrer' }),
                                e('div', { className: 'absolute top-3 left-3' }, e('span', { className: 'theory-tag' }, exp.tag))
                            ),
                            e('div', { className: 'p-5 flex justify-between items-center bg-slate-900/40' },
                                e('h3', { className: 'text-lg font-bold text-white group-hover:text-indigo-400 transition-colors' }, exp.title),
                                e(LucideIcon, { name: exp.icon, color: exp.color })
                            )
                        )
                    )
                ),

                // 結尾
                e('section', { className: 'glass p-8 md:p-12 rounded-3xl border-t-4 border-indigo-500 shadow-2xl relative overflow-hidden fade-in' },
                    e('div', { className: 'absolute top-0 right-0 p-8 opacity-5 pointer-events-none' }, 
                        e(LucideIcon, { name: 'BookOpen', className: 'w-40 h-40' })
                    ),
                    e('h2', { className: 'text-2xl md:text-3xl font-bold mb-6 text-indigo-400' }, "最終反思：人應該如何活？"),
                    !isSubmitted ? e('div', { className: 'relative z-10' },
                        e('p', { className: 'text-slate-300 mb-6' }, "經歷了這場洗禮，此刻的你認為什麼才是最重要的價值？"),
                        e('textarea', {
                            value: reflection,
                            onChange: (e) => setReflection(e.target.value),
                            className: 'w-full h-32 bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all mb-6 resize-none',
                            placeholder: '寫下你此刻的反思...'
                        }),
                        e('div', { className: 'flex justify-end' },
                            e('button', {
                                onClick: () => { if(reflection.trim()) setIsSubmitted(true); },
                                className: `px-10 py-3 rounded-xl font-bold transition-all ${reflection.trim() ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 active:scale-95' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`
                            }, "提交反思")
                        )
                    ) : e('div', { className: 'relative z-10 fade-in space-y-6 text-slate-300' },
                        e('div', { className: 'p-6 bg-slate-950/50 rounded-xl border-l-4 border-indigo-500 italic text-white' }, reflection),
                        e('p', null, "如同林教授所言，倫理學是選擇價值理論的科學。先釐清最重要的價值，才能在道德處境中主動實踐。"),
                        e('p', { className: 'text-indigo-400 font-bold' }, "願這份思辨，讓你未來的抉擇行得比較輕鬆且篤定。")
                    )
                ),
                
                e('footer', { className: 'text-center py-10 text-slate-600 text-xs' }, "© 2026 Ethics Study Lab | Thomas Portfolio")
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
