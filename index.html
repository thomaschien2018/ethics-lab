<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>倫理學讀書會互動實驗室</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&display=swap');
        
        body { 
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif; 
            background-color: #080c17; 
            color: #f1f5f9; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍色陰影 */
            word-break: break-word;
        }

        .glass { 
            background: rgba(16, 23, 42, 0.65); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 導覽按鈕動畫 */
        .nav-btn { position: relative; transition: all 0.3s; }
        .nav-btn.active { color: #818cf8; }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 3px; background: #818cf8; border-radius: 99px; }

        /* 行動端輸入框字體修正 */
        textarea { font-size: 16px !important; }

        /* === PDF 文本視覺優化 === */
        .pdf-container { color: #cbd5e1; line-height: 1.8; letter-spacing: 0.03em; }
        .pdf-title { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 2.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; color: transparent; }
        .pdf-h1 { font-size: 1.6rem; font-weight: 800; color: #818cf8; border-bottom: 2px solid #312e81; padding-bottom: 0.5rem; margin: 3rem 0 1.5rem; }
        .pdf-h2 { font-size: 1.3rem; font-weight: 700; color: #f8fafc; border-left: 5px solid #4f46e5; padding-left: 1rem; margin: 2rem 0 1.25rem; background: linear-gradient(to right, rgba(79,70,229,0.1), transparent); }
        .pdf-quote { background: rgba(30, 41, 59, 0.5); border-radius: 0.75rem; padding: 1.2rem; margin: 1.5rem 0; border-left: 4px solid #818cf8; font-style: italic; color: #94a3b8; }
        
        .pdf-table-wrapper { overflow-x: auto; margin: 1.5rem 0; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .pdf-table { width: 100%; border-collapse: collapse; min-width: 550px; }
        .pdf-table th { background: rgba(30, 41, 59, 0.9); color: #818cf8; padding: 1rem; text-align: left; border-bottom: 2px solid #4f46e5; }
        .pdf-table td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect, useRef } = React;

        function LucideIcon({ name, color = "currentColor", className = "w-6 h-6" }) {
            const spanRef = useRef(null);
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.lucide && spanRef.current) {
                        clearInterval(timer);
                        const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        spanRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                        window.lucide.createIcons({ root: spanRef.current, attrs: { class: className, stroke: color, 'stroke-width': 2 } });
                    }
                }, 100);
                return () => clearInterval(timer);
            }, [name, color, className]);
            return e('span', { ref: spanRef, className: 'inline-flex items-center justify-center shrink-0' });
        }

        // ==========================================
        // 經典導讀內容引擎
        // ==========================================
        const pdfContentLines = [
            "# 【倫理學】 - 林火旺著",
            "h1 壹、倫理學是什麼",
            "h2 〔一〕導論",
            "p1 1. 倫理學是以哲學方法研究道德的一門學問。",
            "p1 2. 哲學思考是透過理性能力，不單跟隨習俗，而是透過批判為道德處境找到解答。",
            "q 「倫理學探討一般習而不察的道德判斷和道德規則，甚至對其假設提出質疑。」",
            "table_0",
            "h1 貳、價值論 (Axiology)",
            "p1 道德哲學的核心問題是「我們應該如何生活？」",
            "p1 必須先確定追求的價值（終點），才進行道德判斷（路徑）。",
            "q 彌勒(John Stuart Mill)：「寧願是一個不滿足的人，也不願意是一隻滿足的豬。」"
        ];

        const GlassTable = () => (
            e('div', { className: 'pdf-table-wrapper' },
                e('table', { className: 'pdf-table' },
                    e('thead', null, e('tr', null, e('th', null, "評價範圍"), e('th', null, "對應詞彙"), e('th', null, "說明"))),
                    e('tbody', null,
                        e('tr', null, e('td', {className:'text-white font-bold'}, "行為"), e('td', null, "對/錯"), e('td', null, "道德上的義務要求。")),
                        e('tr', null, e('td', {className:'text-white font-bold'}, "動機"), e('td', null, "善/惡"), e('td', null, "實踐行為時的意圖。")),
                        e('tr', null, e('td', {className:'text-white font-bold'}, "人格"), e('td', null, "有德/邪惡"), e('td', null, "長期的品格傾向。"))
                    )
                )
            )
        );

        function ReadingPage() {
            return e('div', { className: 'max-w-4xl mx-auto px-6 py-8 fade-in pdf-container' },
                pdfContentLines.map((line, idx) => {
                    if (line.startsWith('# ')) return e('h1', { key: idx, className: 'pdf-title' }, line.slice(2));
                    if (line.startsWith('h1 ')) return e('h1', { key: idx, className: 'pdf-h1' }, line.slice(3));
                    if (line.startsWith('h2 ')) return e('h2', { key: idx, className: 'pdf-h2' }, line.slice(3));
                    if (line.startsWith('p1 ')) return e('p', { key: idx, className: 'mb-4' }, line.slice(3));
                    if (line.startsWith('q ')) return e('div', { key: idx, className: 'pdf-quote' }, line.slice(2));
                    if (line.startsWith('table_0')) return e(GlassTable, { key: idx });
                    return null;
                })
            );
        }

        // ==========================================
        // 主程式：思辨實驗室
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('lab');
            const [activeFlow, setActiveFlow] = useState(null);
            const [step, setStep] = useState(0);
            const [selectedChoice, setSelectedChoice] = useState(null);
            const [reflection, setReflection] = useState('');
            const [isSubmitted, setIsSubmitted] = useState(false);

            useEffect(() => { window.scrollTo(0, 0); }, [activeTab, activeFlow]);

            const experiments = {
                trolley: { title: "電車問題", tag: "規範倫理：目的論", icon: "Train", color: "#f87171", img: "https://i.ibb.co/Q7fssnLR/trolley.png" },
                fatman: { title: "胖子與天橋", tag: "規範倫理：義務論", icon: "Hand", color: "#fb923c", img: "https://i.ibb.co/YFyxd89X/fatman.png" },
                transplant: { title: "器官捐贈", tag: "規則 vs. 行為效益", icon: "Activity", color: "#f472b6", img: "https://i.ibb.co/nNCMznHt/transplant.png" },
                machine: { title: "快樂機器", tag: "價值論：享樂主義", icon: "Brain", color: "#a78bfa", img: "https://i.ibb.co/7J8MXPnV/machine.png" },
                lifeboat: { title: "救生艇兩難", tag: "社會正義：分配正義", icon: "LifeBuoy", color: "#22d3ee", img: "https://i.ibb.co/bgbkn0Zx/lifeboat.png" },
                ring: { title: "蓋吉氏戒指", tag: "倫理利己主義", icon: "Gem", color: "#fbbf24", img: "https://i.ibb.co/8n7fN5zY/ring.png" }
            };

            const studyGuides = {
                trolley: {
                    dilemma: "失控電車衝向 5 人，轉轍器可切換至 1 人軌道。你拉嗎？",
                    options: [
                        { text: "拉下轉轍器 (1死5生)", feedback: "這符合「行為效益主義」：在單一事件中追求最大效益。", perspective: { name: "效益原則", desc: "主張整體結果能產生最大量的善時，就是對的行為。" } },
                        { text: "什麼都不做 (5死1生)", feedback: "這體現了「義務論」立場：有些行為本質就是錯誤的，不可轉嫁傷害。", perspective: { name: "義務論", desc: "康德提出，行為對錯不由結果決定，而是由行為性質決定。" } }
                    ],
                    questions: "「主動殺人」與「任由死亡」有區別嗎？"
                },
                fatman: {
                    dilemma: "推下一名胖子擋住電車救下 5 人，你會動手嗎？",
                    options: [
                        { text: "推下胖子 (殺一救五)", feedback: "採取極端結果論。引發了「消極責任」質疑：你是否承擔了不該有的負擔？", perspective: { name: "結果論", desc: "行為對錯純粹由其產生的總體效益來決定。" } },
                        { text: "絕對不推 (捍衛生命)", feedback: "契合「雙重效應原則」：拒絕將人命當作達成目的的工具。", perspective: { name: "目的原則", desc: "康德強調：「人是目的，而非手段」。" } }
                    ],
                    questions: "道德是數學計算，還是不容退讓的義務？"
                },
                transplant: {
                    dilemma: "醫生拆分健康者的器官救活 5 人。你會執行手術嗎？",
                    options: [
                        { text: "執行手術 (效益極大化)", feedback: "這是行為效益主義的極端運用。忽略了社會信任系統的崩潰成本。", perspective: { name: "行為效益主義", desc: "僅看單次個案的數值回報，忽略長期制度影響。" } },
                        { text: "拒絕手術 (維護制度)", feedback: "選擇了「規則效益主義」。保護病人權利是維護社會長遠最大幸福的規則。", perspective: { name: "規則效益主義", desc: "效益原則是用來檢驗規則，而非單次行為。" } }
                    ],
                    questions: "如果為了「大眾」隨時可犧牲你，你渴望這種社會嗎？"
                },
                machine: {
                    dilemma: "獲得虛擬的永遠快樂且不知情，你願意進入機器嗎？",
                    options: [
                        { text: "進入機器 (追求價值)", feedback: "認同享樂主義：快樂是唯一具有內在價值的事物。", perspective: { name: "享樂主義", desc: "只要精神與感官滿足，現實與否並不重要。" } },
                        { text: "留在現實 (追求真實)", feedback: "認同價值多元論：真實地活過、自我實現比快樂更重要。", perspective: { name: "價值多元論", desc: "認為除了快樂，真實與自主也具有內在價值。" } }
                    ],
                    questions: "真實的痛苦與虛擬的快樂，你選哪一個？"
                },
                lifeboat: {
                    dilemma: "最後一席位，給天才、孤兒，還是孕婦？",
                    options: [
                        { text: "基於社會價值挑選", feedback: "試圖對生命排序。這暴露了目的論在分配正義上的脆弱性。", perspective: { name: "分配正義難題", desc: "效益主義在意總和，卻常忽略如何公平分配。" } },
                        { text: "抽籤決定 (絕對平等)", feedback: "符合無知之幕精神：在未知身分下，唯一公平的是保護平等機率。", perspective: { name: "無知之幕", desc: "羅爾斯主張在公平立場下制定的規則才是正義。" } }
                    ],
                    questions: "生命的重量可以被量化比較嗎？"
                },
                ring: {
                    dilemma: "若有隱身戒指且不受懲罰，你還會堅持道德嗎？",
                    options: [
                        { text: "為了私利行動", feedback: "觸及心理利己主義：認為人類行為終極目標總是自我關懷。", perspective: { name: "社會契約論", desc: "認為道德只是弱者為了防範受害而妥協的契約。" } },
                        { text: "依然堅持道德", feedback: "實踐德行論：道德是為了追求靈魂的健全與真實的幸福。", perspective: { name: "德行倫理學", desc: "重點不在行為對錯，而在「我要成為什麼樣的人」。" } }
                    ],
                    questions: "道德是外在枷鎖，還是靈魂健全的表現？"
                }
            };

            const goHome = () => { setActiveFlow(null); setStep(0); setSelectedChoice(null); };

            return e('div', { className: 'min-h-screen pb-10' },
                e('nav', { className: 'sticky top-0 z-50 glass border-b border-white/5 px-5 py-4 flex justify-center gap-10 md:gap-20 shadow-2xl' },
                    e('button', { onClick: () => { setActiveTab('lab'); goHome(); }, className: `nav-btn text-base md:text-lg font-bold flex items-center gap-2 ${activeTab === 'lab' ? 'active' : 'text-slate-500'}` }, e(LucideIcon, {name:'FlaskConical', className:'w-5 h-5'}), "思辨實驗室"),
                    e('button', { onClick: () => setActiveTab('reading'), className: `nav-btn text-base md:text-lg font-bold flex items-center gap-2 ${activeTab === 'reading' ? 'active' : 'text-slate-500'}` }, e(LucideIcon, {name:'BookOpen', className:'w-5 h-5'}), "經典導讀")
                ),

                activeTab === 'lab' ? (
                    activeFlow ? (
                        e('div', { className: 'max-w-2xl mx-auto py-8 px-6 fade-in' },
                            e('button', { onClick: goHome, className: 'mb-6 flex items-center gap-2 text-slate-400 active:scale-90 transition-all' }, e(LucideIcon, { name: 'ArrowLeft', className: 'w-4 h-4' }), " 返回大廳"),
                            e('div', { className: 'glass p-8 md:p-10 rounded-3xl border-l-4 shadow-2xl', style: { borderColor: experiments[activeFlow].color } },
                                e('h2', { className: 'text-2xl md:text-3xl font-bold mb-6 text-white' }, experiments[activeFlow].title),
                                e('div', { className: 'w-full h-44 md:h-56 mb-8 rounded-2xl overflow-hidden' }, e('img', { src: experiments[activeFlow].img, className:'w-full h-full object-cover' })),
                                step === 0 ? e('div', null,
                                    e('div', { className: 'p-6 bg-slate-900/60 rounded-2xl border border-slate-700 mb-8' }, e('p', { className: 'text-lg text-slate-200' }, studyGuides[activeFlow].dilemma)),
                                    e('div', { className: 'grid grid-cols-1 gap-4' },
                                        studyGuides[activeFlow].options.map((opt, idx) => 
                                            e('button', { key: idx, onClick: () => { setSelectedChoice(idx); setStep(1); }, className: 'p-5 bg-slate-800 active:bg-indigo-600 rounded-xl font-bold text-white border border-slate-700 active:scale-[0.98]' }, opt.text)
                                        )
                                    )
                                ) : e('div', { className: 'fade-in space-y-6' },
                                    e('div', { className: 'p-6 bg-indigo-900/20 rounded-2xl border border-indigo-500/30' },
                                        e('p', { className: 'text-lg text-white mb-4 font-medium' }, studyGuides[activeFlow].options[selectedChoice].feedback),
                                        e('div', { className: 'p-4 bg-slate-950/80 rounded-xl border-l-4 border-indigo-500 text-sm' }, 
                                            e('b', {className:'block mb-1 text-indigo-400'}, studyGuides[activeFlow].options[selectedChoice].perspective.name),
                                            studyGuides[activeFlow].options[selectedChoice].perspective.desc
                                        )
                                    ),
                                    e('button', { onClick: goHome, className: 'w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold active:scale-95' }, "完成討論，返回大廳")
                                )
                            )
                        )
                    ) : (
                        e('div', { className: 'max-w-5xl mx-auto py-10 px-6 fade-in' },
                            e('header', { className: 'text-center mb-16' },
                                e('h1', { className: 'text-4xl md:text-6xl font-black mb-4 bg-gradient-to-r from-blue-400 to-pink-500 bg-clip-text text-transparent' }, "倫理學思辨實驗室"),
                                e('p', { className: 'text-slate-400 text-lg' }, "在抉擇中釐清價值的重量")
                            ),
                            e('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-16' },
                                Object.entries(experiments).map(([key, exp]) => 
                                    e('div', { key, onClick: () => setActiveFlow(key), className: 'glass rounded-2xl overflow-hidden cursor-pointer hover:scale-[1.02] active:scale-[0.98] transition-all group' },
                                        e('div', { className: 'h-40 md:h-48 relative overflow-hidden' },
                                            e('img', { src: exp.img, className: 'h-full w-full object-cover opacity-60 group-hover:opacity-100 transition-all duration-700' }),
                                            e('div', { className: 'absolute top-3 left-3 px-3 py-1 bg-black/50 backdrop-blur-md rounded-full text-[10px] text-indigo-300 border border-indigo-500/30' }, exp.tag)
                                        ),
                                        e('div', { className: 'p-5 flex justify-between items-center' }, e('h3', { className: 'font-bold text-white' }, exp.title), e(LucideIcon, { name: exp.icon, color: exp.color, className:'w-5 h-5' }))
                                    )
                                )
                            ),
                            e('div', { className: 'glass p-8 md:p-12 rounded-3xl border-t-4 border-indigo-500 relative overflow-hidden' },
                                e('h2', { className: 'text-2xl md:text-3xl font-bold mb-6 text-indigo-400' }, "最終反思：人應該如何活？"),
                                !isSubmitted ? e('div', { className: 'relative z-10' },
                                    e('p', { className: 'text-slate-300 mb-6' }, "經歷了這場倫理學洗禮，此刻的你認為什麼才是最重要的？"),
                                    e('textarea', { value: reflection, onChange: (e) => setReflection(e.target.value), className: 'w-full h-32 bg-slate-900/50 border border-slate-700 rounded-2xl p-5 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all mb-6 resize-none', placeholder: '寫下你此刻的反思與答案...' }),
                                    e('div', { className: 'flex justify-end' },
                                        e('button', { onClick: () => { if(reflection.trim()) setIsSubmitted(true); }, className: `px-10 py-3 rounded-2xl font-bold transition-all ${reflection.trim() ? 'bg-indigo-600 text-white shadow-lg active:scale-95' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}` }, "留下反思")
                                    )
                                ) : e('div', { className: 'relative z-10 fade-in space-y-6 text-lg text-slate-300' },
                                    e('div', { className: 'p-6 bg-slate-900/80 rounded-2xl border-l-4 border-indigo-500 italic text-indigo-100' }, `「${reflection}」`),
                                    e('p', null, "如同林教授所言，倫理學是選擇價值理論的科學。先釐清終點，才能確定路徑。"),
                                    e('p', { className: 'text-indigo-400 font-bold' }, "願這份思辨讓你未來的抉擇行得比較輕鬆且篤定。")
                                )
                            )
                        )
                    )
                ) : e(ReadingPage),
                
                e('footer', { className: 'mt-10 py-10 text-center text-slate-600 text-xs leading-relaxed border-t border-white/5' },
                    e('p', null, "本網頁內容延伸自林火旺教授之《倫理學》"),
                    e('p', null, "網站建置與思辨實驗內容由 Thomas Chien 設計製作"),
                    e('p', { className: 'mt-2 opacity-50' }, `© ${new Date().getFullYear()} Thomas Chien Portfolio.`)
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
