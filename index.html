<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect, useRef } = React;

        function LucideIcon({ name, color = "currentColor", className = "w-6 h-6" }) {
            const spanRef = useRef(null);
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.lucide && spanRef.current) {
                        clearInterval(timer);
                        const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                        spanRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                        window.lucide.createIcons({ root: spanRef.current, attrs: { class: className, stroke: color, 'stroke-width': 2 } });
                    }
                }, 100);
                return () => clearInterval(timer);
            }, [name, color, className]);
            return e('span', { ref: spanRef, className: 'inline-flex items-center justify-center shrink-0' });
        }

        // ==========================================
        // PDF 文本資料引擎
        // ==========================================
        const pdfContentLines = [
            "# 【倫理學】 - 林火旺著",
            "h1 壹、倫理學是什麼",
            "h2 〔一〕導論",
            "h3 一、道德和道德哲學的意義",
            "h4 (一)倫理學的意義",
            "p1 1. 倫理學又稱為道德哲學，是以哲學方法研究道德的一門學問。",
            "p1 2. 由於我們日常思考和信念是所在社會背景文化內化的結果，所以哲學研究會對背景預設不斷進行批判評估和反省，哲學思考則是透過人類理性的能力，不單純跟隨習俗或傳統的道德標準，而是透過理性批判，為道德處境找到解答。",
            "p1 3. 因此倫理學就是從具體的事例，深入探究其抽象的理論假設，以這樣的方法研究道德問題。換句話說，倫理學就是將哲學的批判、分析的研究方法應用到倫理道德領域，探討我們日常生活中一般習而不察的道德判斷和道德規則的學問，甚至對道德規則背後的假設提出質疑。",
            "h4 (二)道德和其他規範性主題的比較",
            "p1 1. 倫理(ethics)與道德(morality)的區別：",
            "p2 (1) 有認為倫理是指個人的品格，道德是指人與人之間的關係。",
            "p2 (2) 有認為倫理是指所有生活面向的指引，道德是描述行為選擇的對錯。",
            "p2 (3) 最普遍，則是認為倫理和道德是一樣的，是同義詞(作者採此說)。",
            "p1 2. 倫理學關心的主題：並非事實問題，而是價值或價值判斷的問題。道德判斷不是對實際發生行為的事實描述，而是對行為實踐構成一種規定和要求，藉以鼓勵某些行為或禁止某些行為。",
            "p1 3. 道德具有指引和規範行為的特點，下面的觀念也有，但仍有區別：",
            "p2 (1) 社交禮儀：只是社會習慣、習俗，目的僅在使社會運作順暢，但未觸及、也不關心行為的核心本質。",
            "p2 (2) 宗教：道德規則和規定不必基於神或天，而是來自理性的基礎。因若基於宗教恪守道德，則對於不具相同宗教者欠缺說服力，較難成為社會共同接受的行為指導。",
            "p2 (3) 法律：合法的行為未必符合道德，法律無法涵蓋某些面向(比方說謊未必會違法)，法律禁止的行為未必不道德(比方車子要走右線，禁止開左邊)，違反法律會受公權力制裁，但違反道德只會受到社會大眾無聲譴責。故而，法律仍無法取代道德。只能將嚴重道德缺失行為定為法律強制社會成員不違反。",
            "h4 (三)道德判斷和非道德判斷的區別",
            "p0 對此區別，有不同主張：",
            "p1 1. 主張一：道德判斷是一種包含價值語詞的判斷(如墮胎是錯的/應該的、邪惡的)，非道德判斷則不具有任何價值語詞(如虐待兒童是無趣的)。",
            "q → 批：有價值語詞，但未必涉及道德判斷(如：這是一臺好車)。",
            "p1 2. 主張二：依議題來區分，涉及某些議題的陳述就是道德判斷(如墮胎、安樂死、公民權利)。",
            "q → 批：對這些議題的陳述也未必涉及道德判斷(如墮胎在某些地方合法/支持度高)。",
            "p1 3. 主張三：道德判斷依社會而異，某個社會認為最重要的風俗習慣就會變成這個社會的法律，次重要的就會變成道德，最不重要的就變成禮儀。",
            "q → 批：有些最重要的法律有規範但同時也是道德，且有些不涉及風俗習慣的，也關乎道德判斷(如犧牲自己拯救別人，不涉及風俗習慣，但涉及道德判斷)。",
            "p1 4. 主張四：道德判斷是沒有附帶條件的命令(如人應該遵守諾言、人不應該說謊、亂倫是錯的、人應該互相幫助)，因此附帶條件的命令，就不涉道德判斷(如果你想要賺大錢，就應該好好念書)。",
            "q → 批：未必如此。比方，如果你答應人家，就應該遵守諾言，這雖然是條件句，但也涉及道德判斷。",
            "q ◎ 因此，似乎沒有辦法找到一個區別道德判斷與否的標準，似乎只能仰賴直覺斷定。故而，在倫理學領域，確實無法完全避免使用道德直覺。",
            "h3 二、倫理學的類別和道德評價的範圍",
            "h4 (一)倫理學的分類",
            "p1 1. 規範倫理學(normative ethics)：",
            "p2 (1) 意義：旨在對道德觀念和道德判斷進行系統性了解，並對道德原則的合理性加以探討。一方面探討這些箴言的合理性基礎，一方面歸納出一個或一些更基本的原則，藉以作為道德判斷的依據。目的在於建構有關行為規範的基本原則，以作為日常生活面臨道德問題時的行為指導。",
            "p2 (2) 前備知識：關於規範性的判斷，分為「道德判斷」以及「非道德價值判斷(針對事務狀態的評價，比方張三的車是一臺好車、快樂本身就是善的)」。其中「道德判斷」分為：",
            "p3 ① 道德義務的判斷：涉及「行為」的判斷，常用道德語詞為「對/錯」、「正當/不正當」、「應該/不應該」 → 討論的是行為本身。",
            "p3 ② 道德價值的判斷：涉及「人(動機、企圖、品格)」，常用道德語詞為「好/壞」、「有德/邪惡」等 → 討論的是行為者在實踐該行為時的動機。",
            "p2 當代倫理學者波宜曼(Louis P. Pojman)將道德評價的範圍，區分如下：",
            "table_0",
            "p2 (3) 規範倫理學的分類：",
            "p3 ① 目的論(teleological theory)：關注「行為」本身。主張一個行為的對錯，完全決定在該行為所實現的目的或結果。是用結果的「好/壞」來判斷行為的「對/錯」。包含：倫理利己主義、效益主義。",
            "p3 ② 義務論(deontological theory)：關注「行為」本身。主張一個行為的對錯，不完全是行為所實現的結果或目的，而是由行為本身所具有的性質和特點來決定。因此不去看行為造成的結果，是單看行為本身。包含：康德的倫理學、洛斯的倫理學。",
            "p3 ③ 德行倫理學(virtue ethics)：關注「行為者(人的動機、企圖、品格)」本身。批判目的論和義務論討論單獨討論行為的方向是錯的，重點不是「我應該做什麼行為」，而是「我應該要成為什麼樣的人」。基於我要成就的人格，必須培養相對應的氣質傾向，由此自然會表現在行為之中。",
            "p1 2. 後設倫理學(metaethics)：",
            "p2 (1) 意義：以倫理判斷和原則本身作為研究的對象。受分析哲學影響，認為規範倫理學之所以莫衷一事，就是因為語言使用不夠精確。因此應該要先對「對/錯」、「善/惡」等詞彙進行分析和定義。後設倫理學關注「道德實踐是否因社會而異」？「道德判斷是否可以得到證成」等議題。",
            "p2 (2) 比較：規範倫理學重視的問題是：什麼東西具有價值？什麼樣的行為是對的？後設倫理學則關心價值和對錯的本質，重視的問題是：什麼是價值？什麼是道德義務？",
            "h3 三、倫理學的價值",
            "p1 1. 知道倫理學理論的人，不一定會成為一個道德人。但是如果一個人缺乏道德思辨和分析能力，即使想要從事道德的行為，也常會因為判斷錯誤而事與願違。我們有很多從小到大的道德教誨，但常欠缺進一步思考，導致僅停留在教條式灌輸，無法真正內化成整體性道德信念。",
            "p1 2. 因而，研究倫理學這件事，意義至少有：",
            "p2 (1) 使我們知道某些道德原則和其他原則不能同時成立，因此可以幫我們釐清自己的道德主張，避免自相矛盾。",
            "p2 (2) 可以藉此發現自己的實際道德原則是什麼。知道自己道德觀念接近哪一種派別，及其優點和不足。",
            "p2 (3) 可以讓我們對一般道德主張做批判性理解，並有能力對各派別進行優劣的評估。",
            "p2 (4) 可以讓我們了解道德原則的理性基礎，未來從事道德教化時，不只是說教還能說理。",
            "h2 〔二〕價值論(axiology)",
            "p0 價值理論是哲學的一個分支，主要在研究價值的本質、什麼東西具有價值。價值理論包含道德價值和非道德價值。",
            "h3 一、價值的類別",
            "p1 1. 內在價值(intrinsic value)：本身就是值得人們追求之事物。若滿足「之所以追求a，是為了得到a」時，a就具有內在價值(如快樂)(反過來說，痛苦就具有內在負價值)。",
            "p1 2. 外在價值(extrinsic value)：可以幫助我們實現最終想要追求之事物。若「之所以追求b，是為了得到a」，則b就具有外外在價值(如出國旅遊、買電視、賺錢等。因為這些最終目的是為了獲得快樂)。",
            "h3 二、享樂主義(hedonism)",
            "p0 目標在追求內在價值。",
            "h4 (一)分類：",
            "p1 1. 價值享樂主義(value hedonism)：一元論，只有快樂是唯一具有內在價值的事物。其他有價值的東西都是為了實現快樂。",
            "p2 (1) 區別：",
            "p3 ① 官能論(sensualism)：所有的快樂，都是感官上的快樂。所以快樂的多寡，就是由感官接受到的強度來定義。快樂的對立面是感官到的痛苦。",
            "p3 ② 滿足論(satisfactionism)：快樂不只是感官上的快樂，還包含心靈與精神的滿足或享受。因此，快樂的對立面是不滿足。",
            "p2 (2) 評析：滿足論較有說服力，可以解釋為什麼被虐狂就算感官痛苦，但是內心卻快樂，也能解釋，為何失戀的男女，感官即使沒有痛苦，也會覺得極度不快樂。",
            "p2 (3) 支持者：",
            "p3 ① 邊沁(Jeremy Bentham)：他認為只有快樂才是本身是善，其他我們稱為善的東西，本質都只是為了有助於快樂的實現。",
            "p3 ② 彌勒(John Stuart Mill)：他認為，只有快樂或幸福才具有內在價值。人不只追求感官的快樂，還包含知性、感情、想像力、道德感等高價值的精神快樂。快樂有量的差異也有質的區分，人有精神上的快樂，這種快樂會比較優越、長久、安全。",
            "q 「寧願是一個不滿足的人，也不願意是一隻滿足的豬。」 — J.S. Mill",
            "p3 ● 至於為何我們會認為知識、健康等等有內在價值？其實是誤解，因為這些東西其實只有外在價值，我們之所以認為他們有內在價值，只是因為習慣而已。",
            "p1 2. 非價值享樂主義：認為具有內在價值的事物，不是快樂(一元論)或不只是快樂。區別：",
            "p2 (1) 一元論：一種事物具有內在價值但不是快樂。比方柏拉圖，就認為唯一具有內在價值的是「善」的理型。",
            "p2 (2) 多元論：可以有很多種事物都具有內在價值。比方知識、美、自由、友誼、自我實現，這些都是人們可以直接追求的對象。",
            "h3 三、價值的根源",
            "p0 價值的基礎是什麼？",
            "h4 (一)主觀說：",
            "p1 1. 價值的根源完全屬於我們的內在世界，真正有價值的，是「欲望的滿足」這件事，而幫助我們達到欲望滿足的，都只是工具而已。",
            "p1 2. 這些事物是人類欲望的函數，可能具有價值，但不是價值(比方鑽石為何有價值？是因為人們有欲望得到他，所以賦予它價值)。",
            "h4 (二)客觀說：",
            "p1 1. 價值是獨立於我們心靈之外，價值的根源是單獨存在這個世界上的。人類只是具有道德觀能或美感功能，並用來發現這些本來就客觀存在的價值。",
            "p1 2. 區分：",

                    dilemma: "最後一席救生艇，要給天才、孤兒，還是孕婦？",
                    options: [
                        { text: "基於社會貢獻排序", feedback: "你試圖對生命排序。這暴露了目的論在面對正義分配時的脆弱與爭議性。", perspective: { name: "分配正義難題", desc: "效益主義常忽略分配正義。少數人的苦難若能成就多數人的巨大滿足，有時會被其採納。" } },
                        { text: "抽籤決定 (平等平權)", feedback: "這符合「無知之幕」的精神。在極端情況下，唯一的道德方式是保護每個個體的平等機率。", perspective: { name: "無知之幕 (Veil of Ignorance)", desc: "羅爾斯主張在不知道自己身分的情況下制定的規則，才是最公平的正義。" } }
                    ],
                    questions: "生命的重量可以量化比較嗎？如果可以，誰擁有定價權？"
                },
                ring: {
                    dilemma: "若有隱身戒指且不受罰，你還會堅持道德嗎？",
                    options: [
                        { text: "會為了私利行動", feedback: "這觸及了格勞孔的論證：道德只是弱者為防受害的契約。若無風險，追求利益被視為理性的表現。", perspective: { name: "利己主義 (Egoism)", desc: "認為正義是出於對懲罰的恐懼。若無監督，追求自我利益是人的本性。" } },
                        { text: "依然堅持道德", feedback: "你實踐了德行論。你認為道德是為了靈魂的健康，做壞事會腐蝕自己獲得幸福的能力。", perspective: { name: "德行倫理學", desc: "核心在於「我要成為什麼樣的人」。建立穩定的德行品格，就是最高的理性目標。" } }
                    ],
                    questions: "道德是外在的枷鎖，還是內在人格的健全表現？"
                }
            };

            const goHome = () => { setActiveFlow(null); setStep(0); setSelectedChoice(null); };

                    },

                    )
                ),

                    activeFlow ? (

                                        e('h2', { className: 'text-3xl md:text-4xl font-bold flex items-center gap-4 text-white' }, experiments[activeFlow].title)

                                    e(LucideIcon, { name: experiments[activeFlow].icon, color: experiments[activeFlow].color, className: 'w-10 h-10' })
                                ),

                                    e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                                        studyGuides[activeFlow].options.map((opt, idx) =>

                                        )
                                    )
                                ) : e('div', { className: 'fade-in space-y-8' },
                                    e('div', { className: 'p-8 bg-indigo-900/20 rounded-2xl border border-indigo-500/50 shadow-inner' },

                                        e('div', { className: 'p-5 bg-slate-900/80 rounded-xl border-l-4 border-indigo-400' },

                                            e('p', { className: 'text-slate-300 leading-relaxed' }, studyGuides[activeFlow].options[selectedChoice].perspective.desc)
                                        )
                                    ),
                                    e('div', { className: 'p-8 bg-slate-900/60 rounded-2xl border-l-4 border-blue-500 shadow-inner' },
                                        e('h4', { className: 'text-blue-400 font-bold mb-4 flex items-center gap-2 text-lg' }, e(LucideIcon, {name:'MessageSquare', className:'w-5 h-5'}), "導讀員提問：深度討論"),
                                        e('p', { className: 'text-xl text-white leading-relaxed font-bold' }, studyGuides[activeFlow].questions)
                                    ),
                                    e('button', { onClick: goHome, className: 'w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold text-white transition-colors' }, "完成討論，返回大廳")

                            )

                                        e('div', { className: 'h-48 relative overflow-hidden bg-slate-900' },
                                            e('img', { src: exp.img, className: 'h-full w-full object-cover opacity-60 group-hover:opacity-90 transition-all duration-700 group-hover:scale-110' }),
                                            e('div', { className: 'absolute top-3 left-3' }, e('span', { className: 'theory-tag shadow-md' }, exp.tag))
                                        ),
                                        e('div', { className: 'p-6 flex justify-between items-center' },
                                            e('h3', { className: 'text-xl font-bold text-white' }, exp.title),
                                            e(LucideIcon, { name: exp.icon, color: exp.color })
                                        )
                                    )
                                )
                            ),
                            e('div', { className: 'bg-[#0d1326] p-10 md:p-12 rounded-[2rem] border border-indigo-500/40 shadow-2xl relative overflow-hidden fade-in mb-10' },
                                e('div', { className: 'absolute top-0 right-0 p-8 opacity-5 pointer-events-none' }, 
                                    e(LucideIcon, { name: 'BookOpen', className: 'w-64 h-64' })

                                    e('p', { className: 'text-xl text-slate-200 mb-8 leading-relaxed' }, "經歷了這場倫理學的洗禮，面對價值的衝突與人性的考驗，此刻的你認為什麼才是最重要的？請留下讀書會最後的反思："),
                                    e('textarea', { value: reflection, onChange: (e) => setReflection(e.target.value), className: 'w-full h-40 bg-slate-900/60 border border-slate-700/80 rounded-2xl p-6 text-white text-lg placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all mb-8 resize-none', placeholder: '寫下你此刻的反思與答案...' }),
                                    e('div', { className: 'flex justify-end' },
                                        e('button', { onClick: () => { if(reflection.trim()) setIsSubmitted(true); }, className: `px-10 py-4 rounded-2xl font-bold text-lg transition-all shadow-lg ${reflection.trim() ? 'bg-indigo-600 hover:bg-indigo-500 text-white hover:scale-[1.02]' : 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700'}` }, "留下反思")
                                    )
                                ) : e('div', { className: 'relative z-10 fade-in space-y-6 text-lg text-slate-300 leading-relaxed' },
                                    e('div', { className: 'p-8 bg-slate-900/80 rounded-3xl border-l-4 border-indigo-500 shadow-inner my-8' },
                                        e('p', { className: 'text-2xl text-indigo-100 italic leading-relaxed' }, `「${reflection}」`)
                                    ),
                                    e('p', null, "這份文字，記錄了你如何從直覺邁向理性的批判。"),
                                    e('p', null, "如同林火旺教授所言，倫理學是選擇價值理論的科學。我們必須先了解生命中最重要的價值（終點），才能確定道德判斷的路徑。"),
                                    e('p', { className: 'text-indigo-300 font-bold mt-4' }, "願這份思辨的種子，讓大家在面對人生無數分岔路時，能行得比較輕鬆且篤定。")
                                )
                            )
                        )
                    )
                ) : e(ReadingPage),
                
                // 頁尾：版權與貢獻聲明
                e('footer', { className: 'mt-16 pb-8 text-center text-slate-500 text-sm leading-relaxed border-t border-white/5 pt-8 px-6 fade-in' },
                    e('p', null, "本網站哲學思辨內容延伸自林火旺教授之《倫理學》著作"),
                    e('p', null, "「經典導讀」由 C. H. Huang 帶領實體讀書會進行探討"),
                    e('p', null, "「網站架構與建置」、「思想實驗室」互動內容由 Thomas Chien 設計製作"),
                    e('p', { className: 'mt-4 text-xs opacity-50 tracking-wider font-mono' }, `© ${new Date().getFullYear()} Thomas Chien. All rights reserved.`)
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
